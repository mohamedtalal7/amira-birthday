<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Amira</title>
    <style>
        :root { --pink-light: #ffc1d6; --pink-dark: #ff85a2; --bg-color: #0b0b0b; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; color: white; }
        .container { text-align: center; background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(12px); padding: 30px; border-radius: 30px; box-shadow: 0 15px 40px rgba(255, 133, 162, 0.3); width: 85%; max-width: 400px; position: relative; z-index: 10; border: 1px solid rgba(255, 133, 162, 0.4); overflow-y: auto; max-height: 90vh; }
        .page { display: none; animation: fadeIn 0.4s ease-out; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        h2 { color: var(--pink-light); margin-bottom: 20px; font-size: 22px; text-shadow: 2px 2px 10px rgba(255,133,162,0.6); }
        input[type="password"] { padding: 15px; border: 2px solid var(--pink-dark); border-radius: 15px; text-align: center; font-size: 22px; width: 80%; outline: none; background: rgba(0,0,0,0.6); color: white; margin-bottom: 20px; }
        
        button { background-color: var(--pink-dark); color: white; border: none; padding: 12px 25px; margin: 10px; border-radius: 50px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.2s; animation: fastShake 1.2s infinite ease-in-out; box-shadow: 0 5px 15px rgba(255, 133, 162, 0.5); }
        @keyframes fastShake { 0%, 100% { transform: translateY(0); } 25% { transform: translateY(-4px) rotate(2deg); } 75% { transform: translateY(4px) rotate(-2deg); } }

        #noBtn { animation: moveFaster 1.5s infinite alternate ease-in-out !important; }
        @keyframes moveFaster { 0% { transform: translate(0, 0); } 50% { transform: translate(25px, -15px); } 100% { transform: translate(-25px, 15px); } }

        #counter { font-size: 22px; color: var(--pink-light); font-weight: bold; margin: 15px 0; line-height: 1.4; }
        
        /* تصميم الصورة في صفحة القصيدة */
        .poem-img { width: 150px; height: 150px; border-radius: 20px; border: 3px solid var(--pink-dark); margin: 0 auto 15px; object-fit: cover; box-shadow: 0 0 20px var(--pink-dark); display: block; }
        
        .floating { position: fixed; bottom: -100px; animation: floatUp 6s linear forwards; pointer-events: none; z-index: 1; }
        @keyframes floatUp { to { transform: translateY(-120vh) rotate(360deg); } }
        .poem-box, .typewriter-text { font-size: 16px; line-height: 1.7; color: #fff; text-align: right; white-space: pre-wrap; background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 20px; border-right: 3px solid var(--pink-dark); }
        #poemFinalBtn { display: none; margin-top: 15px; }
    </style>
</head>
<body onload="startGlobalParty()">

    <audio id="bgMusic" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <div id="page0" class="page active">
        <div class="container">
            <h2>حطي كلمة السر ي قلبي 🥹🥰</h2>
            <input type="password" id="passInput" placeholder="••••••">
            <br>
            <button onclick="checkPass()">حطيت 🙂</button>
        </div>
    </div>

    <div id="page_time1" class="page">
        <div class="container">
            <h2>متعرفيش بقالنا قد أي مع بعض 🙃</h2>
            <button onclick="alert('بطلي نصب ي أميرة 😂🙂'); window.location.reload();">عارفه🙂</button>
            <button onclick="nextPage('page_time2')">لأ🙂</button>
        </div>
    </div>

    <div id="page_time2" class="page">
        <div class="container">
            <h2>حياتي منورة بيكي بقالها</h2>
            <div id="counter">جاري الحساب...</div>
            <button onclick="nextPage(1)">دي احلى ايام قضيتها في حياتي ي محمد 🙃</button>
        </div>
    </div>

    <div id="page1" class="page">
        <div class="container">
            <h2>هسالك سؤال صغنون 🙃</h2>
            <button onclick="nextPage(2)">اسال ي حبيبي 🥹</button>
            <button onclick="nextPage(2)">اسال ي قلبي 🥹</button>
        </div>
    </div>

    <div id="page2" class="page">
        <div class="container">
            <h2>بتحبيني ي أميرة 🫣</h2>
            <button onclick="nextPage(3)">🤭</button>
        </div>
    </div>

    <div id="page3" class="page">
        <div class="container">
            <h2>شكلك مش بتحبيني 😔</h2>
            <button onclick="nextPage(4)">متقولش كده بس 🙈</button>
        </div>
    </div>

    <div id="page4" class="page">
        <div class="container" style="min-height: 250px;">
            <h2>يعني بتحبيني ولا لأ 🥺</h2>
            <button onclick="nextPage(5)">بحبك ي ميدو 😭🩷</button>
            <button id="noBtn" onclick="betrayal()">لأ</button>
        </div>
    </div>

    <div id="page5" class="page">
        <div class="container">
            <img src="amira.jpg" class="poem-img" onerror="this.style.display='none'">
            <h2 style="font-size: 24px;">🎉💞🥹 <br>𝑯𝒂𝒑𝒑𝒚 𝒃𝒊𝒓𝒕𝒉𝒅𝒂𝒚 𝑨𝒎𝒊𝒓𝒂</h2>
            <div id="poemText" class="poem-box"></div>
            <button id="poemFinalBtn" onclick="nextPage(6)">وانت طيب ي روح قلبي وان شاء الله نفضل سوا طول عمرنا 🤭💗</button>
        </div>
    </div>

    <div id="page6" class="page">
        <div class="container">
            <div id="finalText" class="typewriter-text"></div>
        </div>
    </div>

    <script>
        function nextPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            let target = (typeof id === 'number') ? 'page' + id : id;
            document.getElementById(target).classList.add('active');
            if(id === 'page_time2') startCounter();
            if(id === 5) startPoem();
            if(id === 6) startFinalText();
            document.getElementById('bgMusic').play().catch(e => console.log("Music ready"));
        }

        function checkPass() {
            if(document.getElementById('passInput').value === "862009") nextPage('page_time1');
            else alert("الرقم السري غلط ي أميرة ركزي 🙂💔");
        }

        function startCounter() {
            const startDate = new Date("2024-11-23T00:00:00");
            setInterval(() => {
                const now = new Date();
                const diff = now - startDate;
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const minutes = Math.floor((diff / 1000 / 60) % 60);
                const seconds = Math.floor((diff / 1000) % 60);
                document.getElementById('counter').innerHTML = `${days} يوم و ${hours} ساعة <br> و ${minutes} دقيقة و ${seconds} ثانية`;
            }, 1000);
        }

        function betrayal() {
            alert("انتي مش كيوت وغدرتي بيا 😭");
            window.location.reload();
        }

        function startGlobalParty() {
            setInterval(() => {
                const el = document.createElement('div');
                el.className = 'floating';
                el.innerHTML = Math.random() > 0.5 ? '🎈' : '❤️';
                el.style.left = Math.random() * 100 + 'vw';
                el.style.fontSize = (Math.random() * 35 + 25) + 'px';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 6000);
            }, 250);
        }

        function startPoem() {
            const text = "ڪـل ســنــة وإنـتـي طـيـبـة ي أحــلـى مـــن يــتـم 16 ســنــة ودا اولــــ عــيـد مــيـلاد لــيـكـي واحــنـا مــع بــعـض وتــانـي عــيـد مــيـلاد لــيـكـي مـــن مــعـرفـتـنا لبــعـض. 🥹🙈💜\n\nبــتـمـنـالـك مـــن ڪـل قــلـبـي إنــ الــسـنـة دي تــكـون ســنــة جـديـدة وســعـيـدة عـلـيـكـي وتــكـونـي مــوفـقـة فــيـه‍ا دايــمـا يا رب.. انــا عـارف إنــ الـســنــة دي هـتـكـون غــيـر أي ســنــة فـاتـت لإنـنـا هـنـكـون فـي ثـانـويـة وانــا عـارفــ ومُـتـيـقـن انــڪ قــدهـا وقـدود وربـنـا و انــك إن شـاء الله هـتـفـرحـيـنـي انــا قـبـل نــفـسـك وهــتـحـقـقـي حــلـمـنـا إن شـاء الله 🥹💞\n\nو آخــر كــلامـي أن اكــون مُـخـلـص لـدعـواتـي لــكـي بـالـسـداد والـتـوفـيـق والـسـعـي الـدائـم واسـتـذاقـة لـذة الـوصـول فـي ڪـل مـا نـتـمـنـاه اللهم آمـيـن 🤲🏻🤍";
            typeWrite('poemText', text, 45, () => {
                document.getElementById('poemFinalBtn').style.display = 'inline-block';
            });
        }

        function startFinalText() {
            const text = "✨️♥️🥹كل حب منحته لكي هو حقكي للابد لن اطلبه يوما ولن اندم عليه ولن اعتبره هباءا فالحب لم يكن يوما صفقة بل كان هدية قدمتها لكي اتمنى انه في ساعات صمت حين يثقل العالم على روحكي تتذكري ان هناك من نظر إليك يوما وراي شيئا يستحق التمسك به وان شعرتي يوما بدفئ لا تعرفي مصدره خفيف عابر كذكرى فلعل ذلك أنا في مكان ما من الزمن ما زلت أفي بوعدي لكي..بحبك يا أميرة ";
            typeWrite('finalText', text, 65);
        }

        function typeWrite(id, text, speed, callback) {
            let i = 0;
            const el = document.getElementById(id);
            el.innerHTML = "";
            function step() {
                if (i < text.length) {
                    el.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(step, speed);
                } else if (callback) callback();
            }
            step();
        }
    </script>
</body>
</html>
